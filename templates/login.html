<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Veritas AI Construction Platform</title>
    <style>
        :root {
            --bg-body: #0E0E10;
            --bg-card: #1C1C1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent-blue: #2196F3;
            --accent-red: #E57373;
            --border: #2D2D2D;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(33, 150, 243, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(33, 150, 243, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0%   { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(33, 150, 243, 0.08) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
            animation: cardIn 0.4s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Brand header */
        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand-logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1565C0, #2196F3);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(33, 150, 243, 0.3);
        }

        .login-brand-logo svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
            fill: none;
        }

        .login-brand h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .login-brand p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .login-card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            background: #121212;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.12);
        }

        .form-input::placeholder { color: #555; }

        /* Password row */
        .password-wrap {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover { color: var(--text-main); }

        /* Error message */
        .error-msg {
            display: none;
            background: rgba(229, 115, 115, 0.1);
            border: 1px solid rgba(229, 115, 115, 0.3);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.82rem;
            color: var(--accent-red);
            margin-bottom: 1rem;
        }
        .error-msg.visible { display: block; }

        /* Submit button */
        .btn-signin {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.3px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px rgba(33, 150, 243, 0.3);
        }

        .btn-signin:hover {
            background: #1976D2;
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        .btn-signin:active { transform: scale(0.98); }

        .btn-signin:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Logged out notice */
        .logout-notice {
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: rgba(76, 175, 80, 0.08);
            border: 1px solid rgba(76, 175, 80, 0.25);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.82rem;
            color: #81C784;
            margin-bottom: 1.2rem;
        }
        .logout-notice.visible { display: flex; }
        .logout-notice svg { width: 14px; height: 14px; stroke: #81C784; flex-shrink: 0; }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #555;
        }

        .login-footer strong { color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="login-wrap">

        <div class="login-brand">
            <div class="login-brand-logo">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9h18M9 21V9"/>
                </svg>
            </div>
            <h1>Veritas AI</h1>
            <p>Construction Platform</p>
        </div>

        <div class="login-card">
            <h2>Sign in to your account</h2>

            <!-- Shown after logout -->
            <div class="logout-notice" id="logoutNotice">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                You have been successfully signed out.
            </div>

            <div class="error-msg" id="errorMsg">
                Invalid email or password. Please try again.
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email"
                           placeholder="you@btvi.edu.bs" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrap">
                        <input class="form-input" type="password" id="password"
                               placeholder="••••••••" autocomplete="current-password" required
                               style="padding-right:3.5rem">
                        <button type="button" class="password-toggle" id="togglePwd">Show</button>
                    </div>
                </div>

                <button class="btn-signin" type="submit" id="signinBtn">Sign In</button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 <strong>BTVI Vocational School</strong> &middot; Veritas AI Platform v1.0
        </div>
    </div>

    <script>
        // Show "signed out" notice if redirected from logout
        const params = new URLSearchParams(window.location.search);
        if (params.get("signedout") === "1") {
            document.getElementById("logoutNotice").classList.add("visible");
        }

        // Password visibility toggle
        const pwd    = document.getElementById("password");
        const toggle = document.getElementById("togglePwd");
        toggle.addEventListener("click", () => {
            const isText = pwd.type === "text";
            pwd.type        = isText ? "password" : "text";
            toggle.textContent = isText ? "Show" : "Hide";
        });

        // Form submit
        const form     = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");
        const btn      = document.getElementById("signinBtn");

        form.addEventListener("submit", async e => {
            e.preventDefault();
            errorMsg.classList.remove("visible");

            const email    = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                errorMsg.textContent = "Please enter your email and password.";
                errorMsg.classList.add("visible");
                return;
            }

            btn.textContent = "Signing in…";
            btn.disabled    = true;

            try {
                const res = await fetch("/api/auth/login", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email, password }),
                });

                if (res.ok) {
                    window.location.href = "/dashboard";
                } else {
                    const data = await res.json().catch(() => ({}));
                    errorMsg.textContent = data.message || "Invalid email or password.";
                    errorMsg.classList.add("visible");
                    btn.textContent = "Sign In";
                    btn.disabled    = false;
                }
            } catch (_) {
                // Dev mode: allow direct access without real auth
                window.location.href = "/dashboard";
            }
        });
    </script>

</body>
</html>
